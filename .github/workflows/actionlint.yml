# Run actionlint on every PR that touches files under .github/.
#
# actionlint catches syntax mistakes, invalid step refs, deprecated fields,
# and ShellCheck issues in `run:` blocks. It runs via reviewdog so violations
# appear as inline review comments on the PR diff.

name: actionlint

on:
  push:
    branches: [ "main", "solution/*" ]
    paths:
      - ".github/**"
  pull_request:
    branches: [ "main", "solution/*" ]
    paths:
      - ".github/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
