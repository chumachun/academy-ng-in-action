# Run zizmor static security analyzer on every PR that touches .github/.
#
# zizmor catches GitHub Actions security anti-patterns: script injection via
# untrusted inputs, over-privileged GITHUB_TOKEN, dangerous use of
# pull_request_target, unpinned third-party actions, and similar issues.
#
# Findings are printed to the workflow log and the job fails if any are
# reported. SARIF / Security-tab integration is intentionally not wired up
# here because it requires GitHub Advanced Security (Code Scanning) to be
# enabled at the repo level; revisit once the org licenses GHAS.

name: zizmor

on:
  push:
    branches: [ "main", "solution/*" ]
    paths:
      - ".github/**"
  pull_request:
    branches: [ "main", "solution/*" ]
    paths:
      - ".github/**"

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install zizmor
        run: python -m pip install zizmor

      - name: Run zizmor
        run: zizmor --format plain .github/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
