<div class="profile">
  <mat-card class="large-centred-content">
    <mat-card-header>
      <mat-card-title color="primary"> Profile </mat-card-title>
    </mat-card-header>
    @if ({ currentProfile: currentProfile$ | async }; as observable) {
      <mat-card-content class="profile-content">
        <div class="profile-users">
          View Profile:
          <app-list
            [selected]="observable.currentProfile ?? undefined"
            (selectedChange)="selectProfile($event)"
          />
        </div>
        @if (observable.currentProfile) {
          <div class="profile-view">
            <app-profile-view [user]="observable.currentProfile" />
          </div>
        }
      </mat-card-content>
    }
  </mat-card>
</div>
