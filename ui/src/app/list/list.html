<mat-nav-list>
  @if (users$ | async; as users) {
    @for (user of users | filterUser; track user.id) {
      <mat-list-item [class.selected]="user.id === selected()?.id" (click)="toggleUser(user)">
        @defer (on viewport) {
          <app-avatar [name]="user.name" />
        } @placeholder {
          <span></span>
        }
        <!-- @defer (on timer(500ms)) {
          <app-avatar [name]="user.name" />
        } @placeholder {
          <span>_</span>
        } -->

        <span>{{ user.name }}</span>
      </mat-list-item>
    } @empty {
      <span>Currently, no users exist. Share the app with your friends!</span>
    }
  }
</mat-nav-list>
